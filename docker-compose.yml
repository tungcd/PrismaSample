version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smart-canteen-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: smart_canteen
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d smart_canteen']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-canteen-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smart-canteen-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-canteen-network

  # CMS Admin App
  cms:
    image: node:18-alpine
    container_name: smart-canteen-cms
    restart: "no"
    working_dir: /app
    command: sh -c "apk add --no-cache python3 make g++ openssl-dev openssl && npm install -g prisma@5.7.1 && npm install && cd packages/prisma && npx prisma generate && cd /app && npm run dev --workspace=@smart-canteen/cms"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://admin:secure_password@postgres:5432/smart_canteen?schema=public
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-super-secret-key-change-this-in-production
      - API_URL=http://api:4000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/cms/node_modules
      - /app/packages/prisma/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-canteen-network

  # Client App
  client:
    image: node:18-alpine
    container_name: smart-canteen-client
    restart: "no"
    working_dir: /app
    command: sh -c "apk add --no-cache python3 make g++ openssl-dev openssl && npm install -g prisma@5.7.1 && npm install && cd packages/prisma && npx prisma generate && cd /app && npm run dev --workspace=@smart-canteen/client"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://admin:secure_password@postgres:5432/smart_canteen?schema=public
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=your-super-secret-key-change-this-in-production
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    ports:
      - '3001:3001'
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/client/node_modules
      - /app/packages/prisma/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-canteen-network

  # NestJS API
  api:
    image: node:18-alpine
    container_name: smart-canteen-api
    restart: "no"
    working_dir: /app
    command: sh -c "apk add --no-cache python3 make g++ openssl-dev openssl && npm install -g prisma@5.7.1 @nestjs/cli@10.2.1 && npm install && cd apps/api && npm rebuild bcrypt && cd /app && cd packages/prisma && npx prisma generate && cd /app && npm run dev --workspace=@smart-canteen/api"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://admin:secure_password@postgres:5432/smart_canteen?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
      - NO_COLOR=true
    ports:
      - '4000:4000'
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/prisma/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-canteen-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  smart-canteen-network:
    driver: bridge
